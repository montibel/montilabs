<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompanyCare Intro</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #061a22;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  .scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
  }

  /* Accent line that draws from left to right */
  .line {
    width: 0;
    height: 3px;
    background: #2ec4b6;
    margin-bottom: 28px;
    animation: drawLine 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards;
  }

  @keyframes drawLine {
    to { width: 520px; }
  }

  /* Clip container for each word */
  .clip {
    overflow: hidden;
    line-height: 1;
  }

  .word-company {
    font-size: 148px;
    font-weight: 700;
    letter-spacing: -4px;
    color: #ffffff;
    transform: translateY(110%);
    animation: riseUp 0.75s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
  }

  .word-care {
    font-size: 148px;
    font-weight: 300;
    letter-spacing: -4px;
    color: #2ec4b6;
    transform: translateY(110%);
    animation: riseUp 0.75s cubic-bezier(0.16, 1, 0.3, 1) 1.05s forwards;
  }

  @keyframes riseUp {
    to { transform: translateY(0); }
  }

  /* Tagline */
  .tagline {
    margin-top: 32px;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #7baab4;
    opacity: 0;
    animation: fadeIn 0.6s ease 1.7s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Dot accent */
  .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #2ec4b6;
    border-radius: 50%;
    margin: 0 10px;
    vertical-align: middle;
    position: relative;
    top: -2px;
  }

  /* Full-screen fade to black overlay */
  .fade-out {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    animation: blackout 0.6s ease 4.2s forwards;
  }

  @keyframes blackout {
    to { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="line"></div>
    <div class="clip"><div class="word-company">Company</div></div>
    <div class="clip"><div class="word-care">Care</div></div>
    <div class="tagline">Cuidado con propósito<span class="dot"></span>Santiago, Chile</div>
  </div>
  <div class="fade-out"></div>
</body>
</html>
