<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>montibel | Fotografía</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* RESET */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: #ffffff;
        color: #1a1a1a;
        line-height: 1.6;
        padding: 60px 30px;
      }

      img {
        max-width: 100%;
        height: auto;
      }

      header {
        max-width: 1400px;
        margin: 0 auto 80px auto;
      }

      header h1 {
        font-size: 1.2rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        font-weight: 400;
      }

      /* GALERÍA RESPONSIVE REAL */
      .gallery {
        max-width: 1400px;
        margin: 0 auto;
        column-width: 380px;
        column-gap: 24px;
      }

      .gallery-item {
        break-inside: avoid;
        margin-bottom: 24px;
        opacity: 0;
        animation: fadeIn 0.8s ease forwards;
      }

      .gallery-item img {
        width: 100%;
        display: block;
        cursor: pointer;
        transition:
          transform 0.4s ease,
          opacity 0.3s ease;
      }

      .gallery-item img:hover {
        transform: scale(1.02);
        opacity: 0.9;
      }

      .gallery-item:nth-child(odd) {
        margin-top: 10px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* TABLET */
      @media (max-width: 768px) {
        body {
          padding: 40px 20px;
        }

        .gallery {
          column-width: 280px;
          column-gap: 16px;
        }

        header {
          margin-bottom: 50px;
        }
      }

      /* MOBILE */
      @media (max-width: 480px) {
        body {
          padding: 30px 15px;
        }

        .gallery {
          column-width: 100%;
          column-gap: 12px;
        }

        .gallery-item {
          margin-bottom: 15px;
        }
      }

      /* LIGHTBOX */
      .lightbox {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .lightbox-img {
        max-width: 95%;
        max-height: 85%;
      }

      .lightbox .close {
        position: absolute;
        top: 30px;
        right: 40px;
        font-size: 2rem;
        color: white;
        cursor: pointer;
      }

      @media (max-width: 600px) {
        .lightbox .close {
          top: 15px;
          right: 20px;
          font-size: 1.8rem;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1></h1>
    </header>

    <main class="gallery" id="photo-grid"></main>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox">
      <span class="close">&times;</span>
      <img class="lightbox-img" id="lightbox-img" />
    </div>

    <script>
      const misFotos = [
        { src: "18.jpg", alt: "Descripción 18" },
        { src: "38.jpg", alt: "Descripción 38" },
        { src: "47.jpg", alt: "Descripción 30" },
        { src: "20.jpg", alt: "Descripción 20" },
        { src: "21.jpg", alt: "Descripción 21" },
        { src: "19.jpg", alt: "Descripción 19" },
        { src: "22.jpg", alt: "Descripción 22" },
        { src: "39.jpg", alt: "Descripción 39" },
        { src: "40.jpg", alt: "Descripción 40" },
        { src: "41.jpg", alt: "Descripción 41" },
        { src: "42.jpg", alt: "Descripción 42" },
        { src: "23.jpg", alt: "Descripción 23" },
        { src: "24.jpg", alt: "Descripción 24" },
        { src: "25.jpg", alt: "Descripción 25" },
        { src: "43.jpg", alt: "Descripción 26" },
        { src: "44.jpg", alt: "Descripción 27" },
        { src: "45.jpg", alt: "Descripción 28" },
        { src: "46.jpg", alt: "Descripción 29" },
        { src: "48.jpg", alt: "Descripción 30" },
        { src: "49.jpg", alt: "Descripción 30" },
        { src: "50.jpg", alt: "Descripción 30" },
        { src: "51.jpg", alt: "Descripción 30" },
        { src: "26.jpg", alt: "Descripción 26" },
        { src: "27.jpg", alt: "Descripción 27" },
        { src: "28.jpg", alt: "Descripción 28" },
        { src: "29.jpg", alt: "Descripción 29" },
        { src: "30.jpg", alt: "Descripción 30" },
        { src: "36.jpg", alt: "Descripción 36" },
        { src: "37.jpg", alt: "Descripción 37" },
        { src: "2.jpg", alt: "Descripción 2" },
        { src: "3.jpg", alt: "Descripción 3" },
        { src: "4.jpg", alt: "Descripción 4" },
        { src: "5.jpg", alt: "Descripción 5" },
        { src: "6.jpg", alt: "Descripción 6" },
        { src: "7.jpg", alt: "Descripción 7" },
        { src: "8.jpg", alt: "Descripción 8" },
        { src: "9.jpg", alt: "Descripción 9" },
        { src: "10.jpg", alt: "Descripción 10" },
        { src: "12.jpg", alt: "Descripción 12" },
        { src: "13.jpg", alt: "Descripción 13" },
        { src: "14.jpg", alt: "Descripción 14" },
        { src: "16.jpg", alt: "Descripción 16" },
        { src: "17.jpg", alt: "Descripción 17" },
      ];

      const renderGallery = () => {
        const grid = document.getElementById("photo-grid");
        const path = "assets/img/";

        grid.innerHTML = "";

        misFotos.forEach((foto) => {
          const card = document.createElement("div");
          card.className = "gallery-item";

          card.innerHTML = `
            <img src="${path}${foto.src}" alt="${foto.alt}" loading="lazy">
          `;

          const img = card.querySelector("img");

          img.addEventListener("click", () => {
            const lightbox = document.getElementById("lightbox");
            const lightboxImg = document.getElementById("lightbox-img");

            lightboxImg.src = img.src;
            lightbox.style.display = "flex";
          });

          grid.appendChild(card);
        });
      };

      document.addEventListener("DOMContentLoaded", renderGallery);

      const lightbox = document.getElementById("lightbox");
      const closeBtn = document.querySelector(".close");

      closeBtn.addEventListener("click", () => {
        lightbox.style.display = "none";
      });

      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) {
          lightbox.style.display = "none";
        }
      });
    </script>
  </body>
</html>
