<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>montibel | Fotografía</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* RESET */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: #ffffff;
        color: #1a1a1a;
        line-height: 1.6;
        padding: 60px 30px;
      }

      img {
        max-width: 100%;
        height: auto;
      }

      header {
        max-width: 1400px;
        margin: 0 auto 80px auto;
      }

      header h1 {
        font-size: 1.2rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        font-weight: 400;
      }

      /* GALERÍA RESPONSIVE REAL */
      .gallery {
        max-width: 1400px;
        margin: 0 auto;
        column-width: 380px;
        column-gap: 24px;
      }

      .gallery-item {
        break-inside: avoid;
        margin-bottom: 24px;
        opacity: 0;
        animation: fadeIn 0.8s ease forwards;
      }

      .gallery-item img {
        width: 100%;
        display: block;
        cursor: pointer;
        transition:
          transform 0.4s ease,
          opacity 0.3s ease;
      }

      .gallery-item img:hover {
        transform: scale(1.02);
        opacity: 0.9;
      }

      .gallery-item:nth-child(odd) {
        margin-top: 10px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* TABLET */
      @media (max-width: 768px) {
        body {
          padding: 40px 20px;
        }

        .gallery {
          column-width: 280px;
          column-gap: 16px;
        }

        header {
          margin-bottom: 50px;
        }
      }

      /* MOBILE */
      @media (max-width: 480px) {
        body {
          padding: 30px 15px;
        }

        .gallery {
          column-width: 100%;
          column-gap: 12px;
        }

        .gallery-item {
          margin-bottom: 15px;
        }
      }

      /* LIGHTBOX */
      .lightbox {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .lightbox-img {
        max-width: 95%;
        max-height: 85%;
      }

      .lightbox .close {
        position: absolute;
        top: 30px;
        right: 40px;
        font-size: 2rem;
        color: white;
        cursor: pointer;
      }

      @media (max-width: 600px) {
        .lightbox .close {
          top: 15px;
          right: 20px;
          font-size: 1.8rem;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1></h1>
    </header>

    <main class="gallery" id="photo-grid"></main>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox">
      <span class="close">&times;</span>
      <img class="lightbox-img" id="lightbox-img" />
    </div>

    <script>
      const misFotos = [
        { src: "montibel-1.jpg", alt: "Foto 1" },
        { src: "montibel-2.jpg", alt: "Foto 2" },
        { src: "montibel-3.jpg", alt: "Foto 3" },
        { src: "montibel-4.jpg", alt: "Foto 4" },
        { src: "montibel-5.jpg", alt: "Foto 5" },
        { src: "montibel-6.jpg", alt: "Foto 6" },
        { src: "montibel-7.jpg", alt: "Foto 7" },
        { src: "montibel-8.jpg", alt: "Foto 8" },
        { src: "montibel-9.jpg", alt: "Foto 9" },
        { src: "montibel-10.jpg", alt: "Foto 10" },
        { src: "montibel-11.jpg", alt: "Foto 11" },
        { src: "montibel-12.jpg", alt: "Foto 12" },
        { src: "montibel-13.jpg", alt: "Foto 13" },
        { src: "montibel-14.jpg", alt: "Foto 14" },
        { src: "montibel-15.jpg", alt: "Foto 15" },
        { src: "montibel-16.jpg", alt: "Foto 16" },
        { src: "montibel-17.jpg", alt: "Foto 17" },
        { src: "montibel-18.jpg", alt: "Foto 18" },
        { src: "montibel-19.jpg", alt: "Foto 19" },
        { src: "montibel-20.jpg", alt: "Foto 20" },
        { src: "montibel-21.jpg", alt: "Foto 21" },
        { src: "montibel-22.jpg", alt: "Foto 22" },
        { src: "montibel-23.jpg", alt: "Foto 23" },
        { src: "montibel-24.jpg", alt: "Foto 24" },
        { src: "montibel-25.jpg", alt: "Foto 25" },
        { src: "montibel-26.jpg", alt: "Foto 26" },
        { src: "montibel-27.jpg", alt: "Foto 27" },
        { src: "montibel-28.jpg", alt: "Foto 28" },
        { src: "montibel-29.jpg", alt: "Foto 29" },
        { src: "montibel-30.jpg", alt: "Foto 30" },
        { src: "montibel-31.jpg", alt: "Foto 31" },
        { src: "montibel-32.jpg", alt: "Foto 32" },
        { src: "montibel-33.jpg", alt: "Foto 33" },
        { src: "montibel-34.jpg", alt: "Foto 34" },
        { src: "montibel-35.jpg", alt: "Foto 35" },
        { src: "montibel-36.jpg", alt: "Foto 36" },
        { src: "montibel-37.jpg", alt: "Foto 37" },
        { src: "montibel-38.jpg", alt: "Foto 38" },
        { src: "montibel-39.jpg", alt: "Foto 39" },
      ];

      const renderGallery = () => {
        const grid = document.getElementById("photo-grid");
        const path = "assets/img/";

        grid.innerHTML = "";

        misFotos.forEach((foto) => {
          const card = document.createElement("div");
          card.className = "gallery-item";

          card.innerHTML = `
            <img src="${path}${foto.src}" alt="${foto.alt}" loading="lazy">
          `;

          const img = card.querySelector("img");

          img.addEventListener("click", () => {
            const lightbox = document.getElementById("lightbox");
            const lightboxImg = document.getElementById("lightbox-img");

            lightboxImg.src = img.src;
            lightbox.style.display = "flex";
          });

          grid.appendChild(card);
        });
      };

      document.addEventListener("DOMContentLoaded", renderGallery);

      const lightbox = document.getElementById("lightbox");
      const closeBtn = document.querySelector(".close");

      closeBtn.addEventListener("click", () => {
        lightbox.style.display = "none";
      });

      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) {
          lightbox.style.display = "none";
        }
      });
    </script>
  </body>
</html>
