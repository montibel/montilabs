<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>montibel | Fotografía</title>

    <!-- PRELOAD (mejora carga inicial) -->
    <link rel="preload" as="image" href="assets/img/1.jpg" />
    <link rel="preload" as="image" href="assets/img/2.jpg" />
    <link rel="preload" as="image" href="assets/img/3.jpg" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #fff;
        color: #1a1a1a;
        line-height: 1.6;
        padding: 60px 30px;
      }

      img {
        max-width: 100%;
        height: auto;
      }

      header {
        max-width: 1400px;
        margin: 0 auto 80px auto;
      }

      header h1 {
        font-size: 1.2rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        font-weight: 400;
      }

      /* MASONRY ESTABLE */
      .gallery {
        max-width: 1400px;
        margin: 0 auto;
        columns: 3;
        column-gap: 24px;
      }

      .gallery-item {
        break-inside: avoid;
        margin-bottom: 24px;
      }

      .gallery-item img {
        width: 100%;
        display: block;
        cursor: pointer;
        background: #f3f3f3;
        transition:
          transform 0.3s ease,
          opacity 0.3s ease;
      }

      .gallery-item img:hover {
        transform: scale(1.02);
        opacity: 0.9;
      }

      /* RESPONSIVE */
      @media (max-width: 1024px) {
        .gallery {
          columns: 2;
        }
      }

      @media (max-width: 600px) {
        body {
          padding: 30px 15px;
        }

        .gallery {
          columns: 1;
        }
      }

      /* LIGHTBOX */
      .lightbox {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.92);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .lightbox-img {
        max-width: 95%;
        max-height: 85%;
      }

      .lightbox .close {
        position: absolute;
        top: 25px;
        right: 30px;
        font-size: 2rem;
        color: white;
        cursor: pointer;
      }

      @media (max-width: 600px) {
        .lightbox .close {
          top: 15px;
          right: 20px;
          font-size: 1.8rem;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1></h1>
    </header>

    <main class="gallery" id="photo-grid"></main>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox">
      <span class="close">&times;</span>
      <img class="lightbox-img" id="lightbox-img" />
    </div>

    <script>
      const misFotos = [
        { src: "1.jpg", alt: "Foto 1" },
        { src: "2.jpg", alt: "Foto 2" },
        { src: "3.jpg", alt: "Foto 3" },
        { src: "4.jpg", alt: "Foto 4" },
        { src: "5.jpg", alt: "Foto 5" },
        { src: "6.jpg", alt: "Foto 6" },
        { src: "7.jpg", alt: "Foto 7" },
        { src: "8.jpg", alt: "Foto 8" },
        { src: "9.jpg", alt: "Foto 9" },
        { src: "10.jpg", alt: "Foto 10" },
        { src: "11.jpg", alt: "Foto 11" },
        { src: "12.jpg", alt: "Foto 12" },
        { src: "13.jpg", alt: "Foto 13" },
        { src: "14.jpg", alt: "Foto 14" },
        { src: "15.jpg", alt: "Foto 15" },
        { src: "16.jpg", alt: "Foto 16" },
        { src: "17.jpg", alt: "Foto 17" },
        { src: "18.jpg", alt: "Foto 18" },
        { src: "19.jpg", alt: "Foto 19" },
        { src: "20.jpg", alt: "Foto 20" },
        { src: "21.jpg", alt: "Foto 21" },
        { src: "22.jpg", alt: "Foto 22" },
        { src: "23.jpg", alt: "Foto 23" },
        { src: "24.jpg", alt: "Foto 24" },
        { src: "25.jpg", alt: "Foto 25" },
        { src: "26.jpg", alt: "Foto 26" },
        { src: "27.jpg", alt: "Foto 27" },
        { src: "28.jpg", alt: "Foto 28" },
        { src: "29.jpg", alt: "Foto 29" },
        { src: "30.jpg", alt: "Foto 30" },
        { src: "31.jpg", alt: "Foto 31" },
        { src: "32.jpg", alt: "Foto 32" },
        { src: "33.jpg", alt: "Foto 33" },
        { src: "34.jpg", alt: "Foto 34" },
        { src: "35.jpg", alt: "Foto 35" },
        { src: "36.jpg", alt: "Foto 36" },
        { src: "37.jpg", alt: "Foto 37" },
        { src: "38.jpg", alt: "Foto 38" },
        { src: "39.jpg", alt: "Foto 39" },
      ];

      const renderGallery = () => {
        const grid = document.getElementById("photo-grid");
        const path = "assets/img/";

        grid.innerHTML = "";

        const observer = new IntersectionObserver(
          (entries, obs) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                const img = entry.target;
                img.src = img.dataset.src;
                obs.unobserve(img);
              }
            });
          },
          { rootMargin: "200px" },
        );

        misFotos.forEach((foto) => {
          const card = document.createElement("div");
          card.className = "gallery-item";

          const img = document.createElement("img");
          img.dataset.src = path + foto.src;
          img.alt = foto.alt;
          img.loading = "lazy";
          img.decoding = "async";

          img.addEventListener("click", () => {
            const lightbox = document.getElementById("lightbox");
            const lightboxImg = document.getElementById("lightbox-img");

            lightboxImg.src = img.src;
            lightbox.style.display = "flex";
          });

          card.appendChild(img);
          grid.appendChild(card);

          observer.observe(img);
        });
      };

      document.addEventListener("DOMContentLoaded", renderGallery);

      // LIGHTBOX
      const lightbox = document.getElementById("lightbox");
      const closeBtn = document.querySelector(".close");

      closeBtn.addEventListener("click", () => {
        lightbox.style.display = "none";
      });

      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) {
          lightbox.style.display = "none";
        }
      });
    </script>
  </body>
</html>
