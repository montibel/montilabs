<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>montilabs — Logo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh;
      background: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #flash {
      position: fixed; inset: 0;
      background: #c8ff3e;
      opacity: 0;
      pointer-events: none;
      z-index: 99;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    .logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glow-outer, .glow-inner {
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
    }

    .glow-outer {
      background: radial-gradient(circle, rgba(200,255,62,.15) 0%, transparent 65%);
      filter: blur(28px);
    }

    .glow-inner {
      background: radial-gradient(circle, rgba(200,255,62,.4) 0%, transparent 45%);
      filter: blur(10px);
    }

    .logo-svg {
      width: 100px; height: 96px;
      position: relative; z-index: 2;
      overflow: visible;
    }

    .path-stroke {
      fill: none;
      stroke: #c8ff3e;
      stroke-width: 1.2;
      stroke-linejoin: round;
      stroke-linecap: round;
      filter: drop-shadow(0 0 5px #c8ff3e) drop-shadow(0 0 14px rgba(200,255,62,.6));
    }

    .path-fill {
      fill: #c8ff3e;
      opacity: 0;
    }

    .wordmark {
      display: flex;
      align-items: baseline;
    }

    .letter {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 30px;
      font-weight: 200;
      letter-spacing: 0.14em;
      color: rgba(240,240,240,0.92);
      opacity: 0;
      display: inline-block;
      will-change: transform, opacity;
    }

    .tagline {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(200,255,62,.5);
      opacity: 0;
    }

    .replay {
      position: fixed; bottom: 28px; right: 28px;
      background: none; border: none;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(240,240,240,.2);
      cursor: pointer; opacity: 0;
      transition: color 0.2s;
    }
    .replay:hover { color: rgba(200,255,62,.6); }
  </style>
</head>
<body>
  <div id="flash"></div>

  <div class="scene">
    <div class="logo-wrap">
      <div class="glow-outer" id="glowOuter"></div>
      <div class="glow-inner" id="glowInner"></div>
      <svg class="logo-svg" viewBox="0 0 48 46" overflow="visible">
        <path class="path-stroke" id="strokePath"
          d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"
        />
        <path class="path-fill" id="fillPath"
          d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"
        />
      </svg>
    </div>

    <div class="wordmark" id="wordmark"></div>
    <div class="tagline" id="tagline">interfaces · animations · creative code</div>
  </div>

  <button class="replay" id="replay">↺ replay</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const strokePath = document.getElementById('strokePath');
    const fillPath   = document.getElementById('fillPath');
    const glowOuter  = document.getElementById('glowOuter');
    const glowInner  = document.getElementById('glowInner');
    const flash      = document.getElementById('flash');
    const tagline    = document.getElementById('tagline');
    const replayBtn  = document.getElementById('replay');

    const pathLen = strokePath.getTotalLength();

    const wm = document.getElementById('wordmark');
    'montilabs'.split('').forEach(ch => {
      const s = document.createElement('span');
      s.className = 'letter';
      s.textContent = ch;
      wm.appendChild(s);
    });
    const letters = [...wm.querySelectorAll('.letter')];

    let breathTween = null;

    function play() {
      if (breathTween) { breathTween.kill(); breathTween = null; }

      gsap.set(strokePath, { strokeDasharray: pathLen, strokeDashoffset: pathLen, opacity: 1 });
      gsap.set(fillPath,   { opacity: 0 });
      gsap.set(glowOuter,  { opacity: 0, scale: 1 });
      gsap.set(glowInner,  { opacity: 0, scale: 1 });
      gsap.set(flash,      { opacity: 0 });
      gsap.set(letters,    { opacity: 0, y: 18 });
      gsap.set(tagline,    { opacity: 0 });
      gsap.set(replayBtn,  { opacity: 0 });

      const tl = gsap.timeline({ delay: 0.5 });

      // 1. Draw stroke
      tl.to(strokePath, {
        strokeDashoffset: 0,
        duration: 1.7,
        ease: 'power2.inOut',
      });

      // 2. Glow builds while drawing
      tl.to(glowOuter, { opacity: 1, duration: 1.1, ease: 'power1.out' }, 0.3);
      tl.to(glowInner, { opacity: 0.9, duration: 0.9, ease: 'power1.out' }, 0.7);

      // 3. Fill floods in
      tl.to(fillPath, { opacity: 1, duration: 0.22, ease: 'power2.in' }, '-=0.08');

      // 4. Stroke fades out — fill takes over
      tl.to(strokePath, { opacity: 0, duration: 0.18 }, '<');

      // 5. Flash
      tl.to(flash, { opacity: 0.1, duration: 0.07 });
      tl.to(flash, { opacity: 0, duration: 0.55, ease: 'power2.out' });

      // 6. Glow pulse on flash
      tl.to([glowOuter, glowInner], {
        scale: 1.6,
        opacity: (i) => i === 0 ? 0.8 : 0.6,
        duration: 0.22,
        ease: 'power2.out',
      }, '<');
      tl.to([glowOuter, glowInner], {
        scale: 1,
        opacity: (i) => i === 0 ? 0.28 : 0.12,
        duration: 1.1,
        ease: 'expo.out',
      });

      // 7. Subtle logo bounce at fill moment
      tl.from('.logo-wrap', {
        scale: 1.07,
        duration: 0.6,
        ease: 'elastic.out(1, 0.55)',
      }, '-=1.2');

      // 8. Wordmark letters
      tl.to(letters, {
        opacity: 1, y: 0,
        duration: 0.65,
        stagger: 0.045,
        ease: 'power3.out',
      }, '-=0.65');

      // 9. Tagline
      tl.to(tagline, { opacity: 1, duration: 0.9, ease: 'power2.out' }, '-=0.25');

      // 10. Replay button
      tl.to(replayBtn, { opacity: 1, duration: 0.4 }, '+=0.6');

      // 11. Breathing glow after reveal
      tl.call(() => {
        breathTween = gsap.to([glowOuter, glowInner], {
          opacity: (i) => i === 0 ? 0.45 : 0.22,
          scale: 1.08,
          duration: 2.4,
          ease: 'sine.inOut',
          yoyo: true,
          repeat: -1,
        });
      });
    }

    replayBtn.addEventListener('click', play);
    play();
  </script>
</body>
</html>
