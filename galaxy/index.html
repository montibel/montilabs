<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>cosmos — montilabs</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #04040f;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #label {
        position: fixed;
        bottom: 28px;
        left: 28px;
        font-family: -apple-system, "Helvetica Neue", sans-serif;
        font-size: 10px;
        font-weight: 400;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.15);
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="label">cosmos · montilabs</div>

    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");

      let W, H, cx, cy, sc;

      // ── RESIZE ───────────────────────────────────────────────────────
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cx = W / 2;
        cy = H / 2;
        sc = Math.min(W, H) / 900;
        initGalaxy();
      }
      window.addEventListener("resize", resize);

      // ── GALAXY ───────────────────────────────────────────────────────
      const STAR_COUNT = 3500;
      let stars = [];

      function initGalaxy() {
        stars = [];
        const arms = 2;
        const maxR = Math.min(W, H) * 0.47;

        for (let i = 0; i < STAR_COUNT; i++) {
          const arm = i % arms;
          const t = Math.pow(Math.random(), 0.55); // denser toward center
          const r = 10 + t * maxR;

          const baseAngle = (arm / arms) * Math.PI * 2;
          const spiralAngle = t * Math.PI * 2.6;
          const scatter = (Math.random() - 0.5) * (0.25 + t * 1.3);
          const angle = baseAngle + spiralAngle + scatter;

          // Differential rotation — inner stars move faster
          const speed = 0.000048 / (0.12 + (r / maxR) * 0.88);

          // Color palette
          let cr, cg, cb;
          const roll = Math.random();
          if (r < maxR * 0.13) {
            // Core — warm yellow-white
            cr = 255;
            cg = 230 + rand(25);
            cb = 160 + rand(70);
          } else if (roll < 0.52) {
            // Blue-white
            cr = 195 + rand(60);
            cg = 210 + rand(45);
            cb = 255;
          } else if (roll < 0.7) {
            // Pure white
            const v = 215 + rand(40);
            cr = cg = cb = v;
          } else if (roll < 0.85) {
            // Cool blue
            cr = 90 + rand(80);
            cg = 140 + rand(80);
            cb = 255;
          } else {
            // Purple
            cr = 175 + rand(80);
            cg = 90 + rand(60);
            cb = 215 + rand(40);
          }

          const opacity = (0.18 + Math.random() * 0.82) * (1 - t * 0.5);
          const size =
            Math.random() < 0.025
              ? 1.4 + Math.random() * 0.6
              : 0.4 + Math.random() * 0.9;

          stars.push({ angle, r, speed, cr, cg, cb, opacity, size });
        }
      }

      function rand(n) {
        return Math.floor(Math.random() * n);
      }

      // ── PLANETS ──────────────────────────────────────────────────────
      function hex2rgb(h) {
        return [
          parseInt(h.slice(1, 3), 16),
          parseInt(h.slice(3, 5), 16),
          parseInt(h.slice(5, 7), 16),
        ];
      }

      const DEFS = [
        { name: "Mercury", br: 56, size: 3, color: "#c0bdb0", period: 8 },
        { name: "Venus", br: 90, size: 5.5, color: "#e8c97a", period: 14 },
        {
          name: "Earth",
          br: 132,
          size: 6,
          color: "#4fc3f7",
          period: 22,
          moon: { br: 15, size: 2, color: "#aaaaaa", period: 3.5 },
        },
        { name: "Mars", br: 180, size: 4.5, color: "#e07a5a", period: 40 },
        { name: "Jupiter", br: 252, size: 13, color: "#d4a96a", period: 105 },
      ];

      const planets = DEFS.map((d) => ({
        ...d,
        rgb: hex2rgb(d.color),
        angle: Math.random() * Math.PI * 2,
        trail: [],
        moon: d.moon
          ? {
              ...d.moon,
              rgb: hex2rgb(d.moon.color),
              angle: Math.random() * Math.PI * 2,
            }
          : null,
      }));

      // ── DRAW: GALAXY ─────────────────────────────────────────────────
      function drawGalaxy() {
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        for (const s of stars) {
          s.angle += s.speed;
          const x = cx + Math.cos(s.angle) * s.r;
          const y = cy + Math.sin(s.angle) * s.r;
          ctx.beginPath();
          ctx.arc(x, y, s.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${s.cr},${s.cg},${s.cb},${s.opacity})`;
          ctx.fill();
        }
        ctx.restore();
      }

      // ── DRAW: VIGNETTE ───────────────────────────────────────────────
      function drawVignette() {
        const g = ctx.createRadialGradient(
          cx,
          cy,
          Math.min(W, H) * 0.28,
          cx,
          cy,
          Math.max(W, H) * 0.78,
        );
        g.addColorStop(0, "rgba(4,4,15,0)");
        g.addColorStop(1, "rgba(4,4,15,0.82)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      }

      // ── DRAW: SUN ────────────────────────────────────────────────────
      let sunPhase = 0;
      function drawSun() {
        sunPhase += 0.012;
        const p = 1 + Math.sin(sunPhase) * 0.07;

        // Outer halo
        const g0 = ctx.createRadialGradient(cx, cy, 0, cx, cy, 90 * sc * p);
        g0.addColorStop(0, "rgba(255,220,80,0.13)");
        g0.addColorStop(1, "rgba(255,100,10,0)");
        ctx.fillStyle = g0;
        ctx.beginPath();
        ctx.arc(cx, cy, 90 * sc * p, 0, Math.PI * 2);
        ctx.fill();

        // Mid glow
        const g1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, 36 * sc * p);
        g1.addColorStop(0, "rgba(255,250,200,1)");
        g1.addColorStop(0.35, "rgba(255,210,80,0.88)");
        g1.addColorStop(0.75, "rgba(255,140,20,0.38)");
        g1.addColorStop(1, "rgba(255,70,0,0)");
        ctx.fillStyle = g1;
        ctx.beginPath();
        ctx.arc(cx, cy, 36 * sc * p, 0, Math.PI * 2);
        ctx.fill();

        // Core
        ctx.beginPath();
        ctx.arc(cx, cy, 9 * sc, 0, Math.PI * 2);
        ctx.fillStyle = "#fffaee";
        ctx.fill();
      }

      // ── DRAW: ORBITS ─────────────────────────────────────────────────
      function drawOrbits() {
        ctx.lineWidth = 0.5;
        for (const p of planets) {
          ctx.beginPath();
          ctx.arc(cx, cy, p.br * sc, 0, Math.PI * 2);
          ctx.strokeStyle = "rgba(255,255,255,0.055)";
          ctx.stroke();
        }
      }

      // ── DRAW: PLANETS ────────────────────────────────────────────────
      function drawPlanets(dt) {
        for (const p of planets) {
          p.angle += ((Math.PI * 2) / (p.period * 1000)) * dt;

          const x = cx + Math.cos(p.angle) * p.br * sc;
          const y = cy + Math.sin(p.angle) * p.br * sc;

          // Trail
          p.trail.push({ x, y });
          if (p.trail.length > 60) p.trail.shift();
          for (let i = 1; i < p.trail.length; i++) {
            const a = (i / p.trail.length) * 0.38;
            ctx.beginPath();
            ctx.moveTo(p.trail[i - 1].x, p.trail[i - 1].y);
            ctx.lineTo(p.trail[i].x, p.trail[i].y);
            ctx.strokeStyle = `rgba(${p.rgb[0]},${p.rgb[1]},${p.rgb[2]},${a})`;
            ctx.lineWidth = p.size * sc * 0.45;
            ctx.stroke();
          }

          // Planet glow
          const gr = p.size * sc * 3.5;
          const glow = ctx.createRadialGradient(x, y, 0, x, y, gr);
          glow.addColorStop(
            0,
            `rgba(${p.rgb[0]},${p.rgb[1]},${p.rgb[2]},0.55)`,
          );
          glow.addColorStop(1, `rgba(${p.rgb[0]},${p.rgb[1]},${p.rgb[2]},0)`);
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(x, y, gr, 0, Math.PI * 2);
          ctx.fill();

          // Planet body
          ctx.beginPath();
          ctx.arc(x, y, p.size * sc, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();

          // Moon
          if (p.moon) {
            const m = p.moon;
            m.angle += ((Math.PI * 2) / (m.period * 1000)) * dt;
            const mx = x + Math.cos(m.angle) * m.br * sc;
            const my = y + Math.sin(m.angle) * m.br * sc;
            ctx.beginPath();
            ctx.arc(mx, my, m.size * sc, 0, Math.PI * 2);
            ctx.fillStyle = m.color;
            ctx.fill();
          }
        }
      }

      // ── LOOP ─────────────────────────────────────────────────────────
      let last = 0;
      function render(ts) {
        const dt = Math.min(ts - last, 50);
        last = ts;

        ctx.fillStyle = "#04040f";
        ctx.fillRect(0, 0, W, H);

        drawGalaxy();
        drawVignette();
        drawOrbits();
        drawSun();
        drawPlanets(dt);

        requestAnimationFrame(render);
      }

      resize();
      requestAnimationFrame(render);
    </script>
  </body>
</html>
