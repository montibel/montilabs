<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Montilabs</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0b0b0b;
        color: #f0f0f0;
        font-family: 'Space Grotesk', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 32px;
      }
      a { color: inherit; text-decoration: none; }
      a:focus-visible { outline: 2px solid #c8ff3e; outline-offset: 3px; border-radius: 3px; }
      .num {
        font-size: clamp(96px, 20vw, 180px);
        font-weight: 700;
        line-height: 1;
        color: transparent;
        -webkit-text-stroke: 1px rgba(200,255,62,0.3);
        letter-spacing: -4px;
        margin-bottom: 24px;
      }
      h1 { font-size: 20px; font-weight: 400; color: rgba(240,240,240,0.5); margin-bottom: 40px; }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        border-radius: 99px;
        border: 1px solid #c8ff3e;
        color: #c8ff3e;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        transition: background 0.2s;
      }
      .btn:hover { background: rgba(200,255,62,0.08); }
    </style>
  </head>
  <body>
    <div>
      <div class="num">404</div>
      <h1>Esta página no existe</h1>
      <a class="btn" href="./index.html">← Volver al inicio</a>
    </div>
  </body>
</html>
