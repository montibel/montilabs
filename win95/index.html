<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 95 Desktop</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;font-size:11px;overflow:hidden;user-select:none;-webkit-user-select:none;cursor:default}
#desktop{position:relative;width:100vw;height:100vh;overflow:hidden}
#desktop-area{position:absolute;inset:0 0 32px 0;overflow:hidden}
#desktop-icons{position:absolute;top:16px;left:8px;display:flex;flex-direction:column;gap:6px}
.d-icon{display:flex;flex-direction:column;align-items:center;gap:2px;width:72px;padding:4px 2px;cursor:default}
.d-icon-lbl{font-size:11px;text-align:center;color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,.9);padding:0 2px}
#taskbar{position:absolute;bottom:0;left:0;right:0;height:32px;background:#c0c0c0;border-top:2px solid #fff;box-shadow:inset 0 1px 0 #dfdfdf;display:flex;align-items:center;padding:0 2px;gap:4px;z-index:9998}
#start-menu{position:absolute;bottom:32px;left:0;width:210px;z-index:9999;background:#c0c0c0;display:none;flex-direction:row;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #404040;border-bottom:2px solid #404040;box-shadow:inset 1px 1px 0 #dfdfdf,inset -1px -1px 0 #808080}
.win{position:absolute;display:flex;flex-direction:column;background:#c0c0c0;min-width:200px;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #404040;border-bottom:2px solid #404040;box-shadow:inset 1px 1px 0 #dfdfdf,inset -1px -1px 0 #808080}
.win-tb{display:flex;align-items:center;gap:4px;height:22px;padding:0 4px;color:#fff;flex-shrink:0;cursor:default;touch-action:none}
.win-ctrl{display:flex;align-items:center;justify-content:center;width:16px;height:14px;font-size:10px;line-height:1;background:#c0c0c0;color:#000;cursor:default;border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #404040;border-bottom:1px solid #404040;flex-shrink:0;padding:0}
.win-ctrl-close{font-size:9px}
.win-menu{display:flex;height:20px;padding:0 2px;background:#c0c0c0;border-bottom:1px solid #808080;flex-shrink:0}
.win-menu button{padding:0 8px;height:100%;background:transparent;border:none;font-family:inherit;font-size:11px;cursor:default;color:#000}
.win-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.win-status{display:flex;height:20px;border-top:1px solid #808080;padding:0 2px;gap:2px;align-items:center;flex-shrink:0}
.status-cell{padding:0 4px;height:14px;font-size:11px;display:flex;align-items:center;border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #dfdfdf;border-bottom:1px solid #dfdfdf}
.resize-handle{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:se-resize;background-image:radial-gradient(circle,#808080 1px,transparent 1px);background-size:4px 4px;background-position:2px 2px;touch-action:none}
.w95-btn{display:inline-flex;align-items:center;justify-content:center;min-width:75px;height:23px;padding:0 8px;background:#c0c0c0;font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#000;cursor:default;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #404040;border-bottom:2px solid #404040;box-shadow:inset 1px 1px 0 #dfdfdf,inset -1px -1px 0 #808080}
.w95-input{font-family:Arial,Helvetica,sans-serif;font-size:11px;padding:2px 4px;background:#fff;color:#000;outline:none;cursor:text;user-select:text;-webkit-user-select:text;border-top:2px solid #404040;border-left:2px solid #404040;border-right:2px solid #fff;border-bottom:2px solid #fff;box-shadow:inset 1px 1px 0 #808080}
.pcard{display:flex;flex-direction:column;background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #404040;border-bottom:2px solid #404040;box-shadow:inset 1px 1px 0 #dfdfdf,inset -1px -1px 0 #808080}
@keyframes w95open{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="desktop">
  <div id="crt-overlay" style="position:absolute;inset:0;pointer-events:none;z-index:99999;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 1px,rgba(0,0,0,.03) 1px,rgba(0,0,0,.03) 2px)"></div>
  <div id="desktop-area">
    <div id="desktop-icons"></div>
  </div>
  <div id="start-menu">
    <div style="width:22px;flex-shrink:0;background:linear-gradient(to top,#1084d0,#000080);display:flex;align-items:center;justify-content:center">
      <span style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:13px;font-weight:bold;font-style:italic;color:#fff;letter-spacing:2px;text-shadow:1px 1px 0 rgba(0,0,0,.4)">Windows 95</span>
    </div>
    <div id="sm-items" style="flex:1;padding:2px 0"></div>
  </div>
  <div id="taskbar">
    <button id="start-btn" type="button" style="display:flex;align-items:center;gap:4px;height:24px;padding:0 8px;font-family:inherit;font-size:11px;font-weight:bold;background:#c0c0c0;cursor:default;color:#000;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #404040;border-bottom:2px solid #404040;box-shadow:inset 1px 1px 0 #dfdfdf,inset -1px -1px 0 #808080">
      <div style="display:inline-grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;width:13px;height:13px;flex-shrink:0">
        <span style="background:#f00"></span><span style="background:#0a0"></span>
        <span style="background:#00e"></span><span style="background:#fa0"></span>
      </div>
      <strong>Start</strong>
    </button>
    <div style="width:2px;height:24px;border-left:1px solid #808080;border-right:1px solid #dfdfdf;flex-shrink:0"></div>
    <div id="task-btns" style="flex:1;display:flex;gap:2px;overflow:hidden"></div>
    <div style="display:flex;align-items:center;height:24px;padding:0 6px;flex-shrink:0;border-top:1px solid #808080;border-left:1px solid #808080;border-right:1px solid #dfdfdf;border-bottom:1px solid #dfdfdf">
      <time id="clock" style="font-size:11px"></time>
    </div>
  </div>
</div>
<script>
// ── LANGUAGE ─────────────────────────────────────────────────────────────
const lang = localStorage.getItem("ml_lang") || "es";

// ── TRANSLATIONS ─────────────────────────────────────────────────────────
const T = {

    cmpErrs: {

    },

    errIE:       "IEXPLORE.EXE ha realizado una operación ilegal<br>y se cerrará.",

    errShutdown: "Acceso denegado.<br>No puedes apagar este equipo.",

  },

    winMenus:  { notepad:["File","Edit","Format","Help"], computer:["File","Edit","View"], services:["File","View","Help"], contact:["File","Edit","Help"], portfolio:["File","View","Help"], about:["File","Edit","View","Help"] },
    dIcons:    ["My Computer","Portfolio","Contact","Notepad","Recycle Bin","Internet Explorer"],
    sm:        [
      { ico:"📁", lbl:"Programs",   key:"Programs",    arrow:true },
      { ico:"📄", lbl:"Documents",  key:"Documents",   arrow:true },
      { ico:"⚙️", lbl:"Settings",  key:"Settings",    arrow:true },
      { ico:"🔍", lbl:"Find",       key:"Find",        arrow:true },
      { ico:"❓", lbl:"Help",       key:"Help" },
      { ico:"📂", lbl:"Run…",       key:"Run…" },
      { sep:true },
      { ico:"🔌", lbl:"Shut Down…", key:"Shut Down…" },
    ],
    skills:       "Skills",
    portfolioBtn: "Portfolio",
    contactBtn:   "Contact Me",
    viewBtn:      "View →",
    nameLbl:  "Name:", emailLbl: "E-mail:", msgLbl: "Message:",
    namePh:   "Your name", emailPh: "you@example.com", msgPh: "Type your message…",
    sendsTo:  "Sends to:",
    sendBtn:  "Send", clearBtn: "Clear",
    ready:    "Ready",
    opening:  "Opening email client…",
    projects: n => `${n} project(s)`,
    services: n => `${n} service(s)`,
    objects:  "6 object(s)",
    cmpItems: [["📁","Documents"],["📁","Downloads"],["💾","Floppy (A:)"],["💿","CD-ROM (D:)"],["🖨️","Printers"],["🌐","Network"]],
    cmpErrs: {
      "Documents":   "Access is denied.<br>You do not have permission to access this folder.",
      "Downloads":   "Downloads folder is empty.<br>No files found.",
      "Floppy (A:)": "A: is not accessible.<br>The device is not ready.",
      "CD-ROM (D:)": "The disc in drive D: is not formatted.<br>Do you want to format it now?",
      "Printers":    "No printers installed.<br>Please contact your system administrator.",
      "Network":     "No network resources available.<br>The network path was not found.",
    },
    errRecycle:  "Cannot empty Recycle Bin.<br>Access is denied.",
    errIE:       "IEXPLORE.EXE has performed an illegal operation<br>and will be shut down.",
    errFind:     "Find: feature not available<br>in this version.",
    errRun:      "The name specified is not recognized<br>as a program or command.",
    errShutdown: "Access is denied.<br>You cannot shut down this computer.",
    errRequired: "All fields are required.<br>Please fill in Name, E-mail and Message.",
    errEmail:    "The e-mail address entered is not valid.<br>Please check and try again.",
    defaultBio:  "Hello! I'm a developer & designer.\n\nI build clean, fast, and accessible web experiences.\n\n— Replace this text with your own story.",
  },
};

const t = T[lang] || T.es;

// ── CONFIG ── edit to customize ──────────────────────────────────────────
const CFG = {
  userName:     "Your Name",
  userTitle:    "Developer & Designer",
  tagline:      "Available for freelance",
  userCity:     "Your City",
  userBio:      t.defaultBio,
  avatarEmoji:  "👤",
  skills:       "React · TypeScript · Figma",
  githubUrl:    "",
  linkedinUrl:  "",
  instagramUrl: "",
  websiteUrl:   "",
  contactEmail: "you@example.com",
  desktopColor: "#008080",
  fontFamily:   "Arial, Helvetica, sans-serif",
  enableSounds: true,
  showCrt:      true,
  showAnimations: true,
  portfolio: [
    { icon:"🌐", title:"Web App",        desc:"A fast, responsive web application built with modern tech.", url:"https://example.com" },
    { icon:"🎨", title:"Brand Identity", desc:"Logo and visual system designed for a growing startup.",    url:"https://example.com" },
    { icon:"📱", title:"Mobile App",     desc:"Cross-platform mobile experience for iOS & Android.",       url:"https://example.com" },
    { icon:"⚡", title:"Landing Page",   desc:"High-converting product page with custom animations.",      url:"https://example.com" },
  ],
  services: [
    { icon:"💻", title:"Web Development",    desc:"Custom websites built with modern web standards." },
    { icon:"🎨", title:"UI / UX Design",     desc:"User-centered design and interactive prototypes." },
    { icon:"📱", title:"Mobile Development", desc:"Responsive apps that work on any device." },
    { icon:"⚡", title:"Performance Audit",  desc:"Speed optimisation and Core Web Vitals improvements." },
  ],
};

// ── SOUNDS ───────────────────────────────────────────────────────────────
let _ctx = null;
function getCtx() {
  try {
    if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (_ctx.state === "suspended") _ctx.resume();
    return _ctx;
  } catch { return null; }
}
function tone(ac, freq, t2, dur, type="square", vol=0.07) {
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = type; o.frequency.setValueAtTime(freq, t2);
  g.gain.setValueAtTime(vol, t2);
  g.gain.exponentialRampToValueAtTime(0.001, t2 + dur);
  o.start(t2); o.stop(t2 + dur + 0.01);
}
const SFX = {
  open()  { const ac=getCtx(); if(!ac) return; const t2=ac.currentTime; tone(ac,523.25,t2,.12); tone(ac,659.25,t2+.08,.18); },
  close() { const ac=getCtx(); if(!ac) return; const t2=ac.currentTime; tone(ac,440,t2,.1,"square",.06); tone(ac,330,t2+.06,.14,"square",.06); },
  error() { const ac=getCtx(); if(!ac) return; const t2=ac.currentTime; tone(ac,493.88,t2,.35,"sine",.09); tone(ac,369.99,t2+.04,.35,"sine",.06); },
  menu()  { const ac=getCtx(); if(!ac) return; const t2=ac.currentTime; tone(ac,880,t2,.05,"square",.04); tone(ac,1100,t2+.04,.07,"square",.04); },
};

// ── WINDOW DEFINITIONS ───────────────────────────────────────────────────
const WINS = [
  { id:"notepad",   ix:220, iy:230, iw:400, ih:250 },
  { id:"computer",  ix:530, iy:170, iw:330, ih:250, status:true },
  { id:"services",  ix:410, iy: 24, iw:360, ih:280, status:true },
  { id:"contact",   ix:490, iy: 55, iw:330, ih:320, status:true },
  { id:"portfolio", ix: 24, iy:190, iw:540, ih:250, status:true },
  { id:"about",     ix: 24, iy: 24, iw:370, ih:310, status:true },
  { id:"error",     ix:280, iy:225, iw:320, ih:150, system:true },
];

function mkState() {
  const r = {};
  WINS.forEach((c,i) => {
    r[c.id] = { x:c.ix, y:c.iy, w:c.iw, h:c.ih,
      visible: c.id !== "error", mini:false, maxi:false,
      z: 10+i, active: c.id === "about",
      rx:c.ix, ry:c.iy, rw:c.iw, rh:c.ih };
  });
  return r;
}

// ── STATE ────────────────────────────────────────────────────────────────
const S = { wins: mkState(), menuOpen: false, selIco: null, selCmp: null };
let errMsg = "An unexpected error has occurred.<br>The operation could not be completed.";
let statusTimer = null;
let containerW = window.innerWidth, containerH = window.innerHeight;
const wEls = {};

const getCfg = id => WINS.find(w => w.id === id);
const compact = () => containerW < 560;

// ── FOCUS / Z-ORDER ──────────────────────────────────────────────────────
function focus(id) {
  if (id === "error" && !S.wins[id].active && CFG.enableSounds) SFX.error();
  const entries = Object.entries(S.wins).sort((a,b) => a[1].z - b[1].z);
  let z = 10;
  entries.forEach(([k]) => { if (k !== id) S.wins[k].z = z++; });
  S.wins[id].z = z;
  Object.keys(S.wins).forEach(k => S.wins[k].active = k === id);
  updateAllWins(); updateTaskbar();
}

// ── ACTIONS ──────────────────────────────────────────────────────────────
function openWin(id) {
  const s = S.wins[id];
  if (CFG.enableSounds && id !== "error" && (!s.visible || s.mini)) SFX.open();
  S.wins[id].visible = true; S.wins[id].mini = false;
  focus(id);
  if (CFG.showAnimations) {
    const el = wEls[id];
    if (el) { el.style.animation="none"; el.offsetHeight; el.style.animation="w95open .12s ease-out"; }
  }
  if (id === "contact") setTimeout(bindContactForm, 50);
}

function closeWin(id) {
  if (CFG.enableSounds && id !== "error") SFX.close();
  S.wins[id].visible = false; S.wins[id].mini = false; S.wins[id].active = false;
  const next = Object.entries(S.wins).filter(([k,v]) => k!==id && v.visible && !v.mini).sort((a,b)=>b[1].z-a[1].z)[0];
  if (next) S.wins[next[0]].active = true;
  updateWin(id); updateTaskbar();
}

function miniWin(id) {
  if (CFG.enableSounds) SFX.close();
  S.wins[id].mini = true; S.wins[id].active = false;
  const next = Object.entries(S.wins).filter(([k,v]) => k!==id && v.visible && !v.mini).sort((a,b)=>b[1].z-a[1].z)[0];
  if (next) S.wins[next[0]].active = true;
  updateWin(id); updateTaskbar();
}

function maxiWin(id) {
  const s = S.wins[id];
  if (s.maxi) {
    Object.assign(S.wins[id], { maxi:false, x:s.rx, y:s.ry, w:s.rw, h:s.rh });
  } else {
    Object.assign(S.wins[id], { maxi:true, rx:s.x, ry:s.y, rw:s.w, rh:s.h, x:0, y:0, w:containerW, h:containerH-32 });
  }
  if (!S.wins[id].active) focus(id); else updateWin(id);
}

function showError(msg) {
  errMsg = msg;
  const el = document.getElementById("err-msg");
  if (el) el.innerHTML = msg;
  openWin("error");
}

function taskClick(id) {
  const s = S.wins[id];
  if (!s.visible || s.mini) openWin(id);
  else if (s.active) miniWin(id);
  else focus(id);
}

// ── UPDATE DOM ───────────────────────────────────────────────────────────
function updateWin(id) {
  const s = S.wins[id], cfg = getCfg(id), el = wEls[id];
  if (!el) return;
  const cp = compact(), forceMaxi = cp || s.maxi;

  if (!s.visible || s.mini || (cp && !s.active)) { el.style.display="none"; return; }
  el.style.display = "flex";

  if (forceMaxi) { el.style.top="0"; el.style.left="0"; el.style.width="100%"; el.style.height="100%"; }
  else { el.style.top=s.y+"px"; el.style.left=s.x+"px"; el.style.width=s.w+"px"; el.style.height=s.h+"px"; }
  el.style.zIndex = s.z;

  const tb = el.querySelector(".win-tb");
  if (tb) tb.style.background = s.active ? "#000080" : "#6e6e6e";

  const minB = el.querySelector("[data-min]"), maxB = el.querySelector("[data-max]");
  const hide = cp || cfg.system;
  if (minB) minB.style.display = hide ? "none" : "flex";
  if (maxB) { maxB.style.display = hide ? "none" : "flex"; maxB.textContent = s.maxi ? "❐" : "□"; }

  const rh = el.querySelector(".resize-handle");
  if (rh) rh.style.display = forceMaxi ? "none" : "";
}

function updateAllWins() { WINS.forEach(c => updateWin(c.id)); }

function updateTaskbar() {
  const tb = document.getElementById("task-btns");
  if (!tb) return; tb.innerHTML = "";
  WINS.filter(c => !c.system && (S.wins[c.id].visible || S.wins[c.id].mini)).forEach(cfg => {
    const s = S.wins[cfg.id], active = s.active && s.visible && !s.mini;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.style.cssText = `height:24px;padding:0 6px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;text-align:left;background:${active?"#a0a0a0":"#c0c0c0"};font-family:inherit;cursor:default;color:#000;${active?"border-top:2px solid #808080;border-left:2px solid #808080;border-right:2px solid #dfdfdf;border-bottom:2px solid #dfdfdf":"border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #404040;border-bottom:2px solid #404040;box-shadow:inset 1px 1px 0 #dfdfdf,inset -1px -1px 0 #808080"}`;
    const icon = { notepad:"📝", computer:"🖥️", services:"🛠️", contact:"✉️", portfolio:"📁", about:"👤" };
    btn.textContent = `${icon[cfg.id]} ${t.winTitles[cfg.id]}`;
    btn.addEventListener("click", () => taskClick(cfg.id));
    tb.appendChild(btn);
  });
}

function updateStartMenu() {
  document.getElementById("start-menu").style.display = S.menuOpen ? "flex" : "none";
}

// ── BUILD WINDOWS ────────────────────────────────────────────────────────
function buildWin(cfg) {
  const s = S.wins[cfg.id];
  const el = document.createElement("div");
  el.id = "win-" + cfg.id;
  el.className = "win";
  el.setAttribute("role","dialog");

  const tb = document.createElement("div");
  tb.className = "win-tb";
  tb.style.background = s.active ? "#000080" : "#6e6e6e";
  const icons = { notepad:"📝", computer:"🖥️", services:"🛠️", contact:"✉️", portfolio:"📁", about:"👤", error:"⚠️" };
  const menu = t.winMenus[cfg.id];
  tb.innerHTML = `
    <span style="font-size:13px;width:16px;flex-shrink:0">${icons[cfg.id]}</span>
    <h2 style="flex:1;font-size:11px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;color:inherit;font-family:Arial,Helvetica,sans-serif">${t.winTitles[cfg.id]}</h2>
    <div style="display:flex;gap:2px">
      ${!cfg.system?`<button type="button" class="win-ctrl" data-min aria-label="–">_</button>`:""}
      ${!cfg.system?`<button type="button" class="win-ctrl" data-max aria-label="□">□</button>`:""}
      <button type="button" class="win-ctrl win-ctrl-close" data-close aria-label="✕">✕</button>
    </div>`;

  tb.querySelector("[data-close]").addEventListener("click", () => closeWin(cfg.id));
  tb.querySelector("[data-min]")?.addEventListener("click", () => miniWin(cfg.id));
  tb.querySelector("[data-max]")?.addEventListener("click", () => maxiWin(cfg.id));

  tb.addEventListener("pointerdown", e => {
    if (e.target.closest("[data-min],[data-max],[data-close]")) return;
    if (compact() || S.wins[cfg.id].maxi) return;
    const area = document.getElementById("desktop-area").getBoundingClientRect();
    const sw = S.wins[cfg.id];
    dragSt = { id:cfg.id, ox:e.clientX-area.left-sw.x, oy:e.clientY-area.top-sw.y };
    tb.setPointerCapture(e.pointerId); e.preventDefault();
  });
  tb.addEventListener("dblclick", e => {
    if (e.target.closest("[data-min],[data-max],[data-close]")) return;
    if (!compact() && !cfg.system) maxiWin(cfg.id);
  });
  el.appendChild(tb);

  if (menu) {
    const mb = document.createElement("div");
    mb.className = "win-menu";
    mb.innerHTML = menu.map(m=>`<button type="button">${m}</button>`).join("");
    el.appendChild(mb);
  }

  const ct = document.createElement("div");
  ct.className = "win-content";
  ct.innerHTML = CONTENTS[cfg.id]?.() || "";
  el.appendChild(ct);

  if (cfg.status) {
    const sb = document.createElement("div");
    sb.className = "win-status"; sb.id = "sb-"+cfg.id;
    const txt = cfg.id==="portfolio" ? t.projects(CFG.portfolio.length) : cfg.id==="services" ? t.services(CFG.services.length) : cfg.id==="computer" ? t.objects : t.ready;
    sb.innerHTML = `<span class="status-cell">${txt}</span>`;
    el.appendChild(sb);
  }

  if (!cfg.system) {
    const rh = document.createElement("div");
    rh.className = "resize-handle";
    rh.addEventListener("pointerdown", e => {
      const sw = S.wins[cfg.id];
      resizeSt = { id:cfg.id, sx:e.clientX, sy:e.clientY, sw:sw.w, sh:sw.h };
      rh.setPointerCapture(e.pointerId); e.preventDefault();
    });
    el.appendChild(rh);
  }

  el.addEventListener("pointerdown", () => { if (!S.wins[cfg.id].active) focus(cfg.id); });
  return el;
}

// ── DRAG & RESIZE ────────────────────────────────────────────────────────
let dragSt = null, resizeSt = null;

document.addEventListener("pointermove", e => {
  const area = document.getElementById("desktop-area");
  if (!area) return;
  const r = area.getBoundingClientRect();
  if (dragSt) {
    const { id, ox, oy } = dragSt, s = S.wins[id];
    S.wins[id].x = Math.max(0, Math.min(e.clientX-r.left-ox, r.width-s.w));
    S.wins[id].y = Math.max(0, Math.min(e.clientY-r.top-oy,  r.height-s.h));
    updateWin(id);
  }
  if (resizeSt) {
    const { id, sx, sy, sw, sh } = resizeSt;
    S.wins[id].w = Math.max(200, sw+e.clientX-sx);
    S.wins[id].h = Math.max(150, sh+e.clientY-sy);
    updateWin(id);
  }
});
document.addEventListener("pointerup",     () => { dragSt=null; resizeSt=null; });
document.addEventListener("pointercancel", () => { dragSt=null; resizeSt=null; });

  { ico:"🖥️", fn:()=>openWin("computer") },

function selIco(lbl) {
  S.selIco = lbl;
  document.querySelectorAll(".d-icon").forEach(el => {
    const l = el.dataset.lbl, sel = l===lbl;
    el.style.background = sel ? "rgba(0,0,128,.35)" : "transparent";
    el.style.outline    = sel ? "1px dotted rgba(255,255,255,.7)" : "none";
    const span = el.querySelector(".d-icon-lbl");
    if (span) { span.style.background=sel?"#000080":"transparent"; span.style.color="#fff"; }
  });
}

function selCmp(lbl) {
  S.selCmp = lbl;
  document.querySelectorAll("[data-cmp]").forEach(el => {
    const l = el.dataset.cmp, sel = l===lbl;
    el.style.background = sel ? "rgba(0,0,128,.35)" : "transparent";
    el.style.outline    = sel ? "1px dotted rgba(0,0,128,.6)" : "none";
    const span = el.querySelector(".cmp-lbl");
    if (span) { span.style.background=sel?"#000080":"transparent"; span.style.color=sel?"#fff":"#000"; }
  });
}

function buildDesktopIcons() {
  const wrap = document.getElementById("desktop-icons");
  D_ICONS.forEach(({ ico, fn }, i) => {
    const lbl = t.dIcons[i];
    const el = document.createElement("div");
    el.className="d-icon"; el.dataset.lbl=lbl;
    el.setAttribute("role","button"); el.setAttribute("tabindex","0"); el.setAttribute("aria-label",lbl);
    el.innerHTML=`<span style="font-size:28px">${ico}</span><span class="d-icon-lbl">${lbl}</span>`;
    el.addEventListener("click",  e=>{e.stopPropagation();S.menuOpen=false;updateStartMenu();selIco(lbl);});
    el.addEventListener("dblclick",()=>{S.menuOpen=false;updateStartMenu();fn();selIco(null);});
    el.addEventListener("keydown", e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();fn();selIco(null);}});
    wrap.appendChild(el);
  });
}

function buildStartMenu() {
  const wrap = document.getElementById("sm-items");
  t.sm.forEach(item => {
    if (item.sep) {
      const d = document.createElement("div");
      d.style.cssText="margin:2px 4px;border-top:1px solid #808080;border-bottom:1px solid #dfdfdf";
      wrap.appendChild(d); return;
    }
    const el = document.createElement("div");
    el.setAttribute("role","menuitem"); el.setAttribute("tabindex","0");
    el.style.cssText="display:flex;align-items:center;height:26px;padding:0 4px;gap:4px;cursor:default";
    el.innerHTML=`<span style="width:20px;font-size:14px;text-align:center;flex-shrink:0">${item.ico}</span><span style="flex:1;font-size:12px">${item.lbl}</span>${item.arrow?`<span style="font-size:8px">▶</span>`:""}`;
    el.addEventListener("pointerenter",()=>{el.style.background="#000080";el.style.color="#fff";});
    el.addEventListener("pointerleave",()=>{el.style.background="";el.style.color="";});
    const act = ()=>{SM_ACTIONS[item.key]?.();S.menuOpen=false;updateStartMenu();updateTaskbar();};
    el.addEventListener("click", act);
    el.addEventListener("keydown",e=>{if(e.key==="Enter")act();});
    wrap.appendChild(el);
  });
}

// ── CONTACT FORM ─────────────────────────────────────────────────────────
function bindContactForm() {
  const form = document.getElementById("c-form");
  const clearBtn = document.getElementById("c-clear");
  if (!form || form._bound) return;
  form._bound = true;
  clearBtn?.addEventListener("click",()=>{
    document.getElementById("c-name").value="";
    document.getElementById("c-email").value="";
    document.getElementById("c-msg").value="";
  });
  form.addEventListener("submit", e=>{
    e.preventDefault();
    const name  = document.getElementById("c-name")?.value.trim()  || "";
    const email = document.getElementById("c-email")?.value.trim() || "";
    const msg   = document.getElementById("c-msg")?.value.trim()   || "";
    if (!name||!email||!msg){ showError(t.errRequired); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ showError(t.errEmail); return; }
    const subj = encodeURIComponent(`Portfolio contact from ${name}`);
    const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\n${msg}`);
    location.href=`mailto:${CFG.contactEmail}?subject=${subj}&body=${body}`;
    const sb = document.querySelector("#sb-contact .status-cell");
    if (sb) sb.textContent = t.opening;
    document.getElementById("c-name").value="";
    document.getElementById("c-email").value="";
    document.getElementById("c-msg").value="";
    if (statusTimer) clearTimeout(statusTimer);
    statusTimer = setTimeout(()=>{const s=document.querySelector("#sb-contact .status-cell");if(s)s.textContent=t.ready;},3000);
  });
}

// ── CLOCK ────────────────────────────────────────────────────────────────
function startClock() {
  const tick = ()=>{
    const el=document.getElementById("clock"); if(!el) return;
    const d=new Date();
    el.textContent=`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  };
  tick(); setInterval(tick,1000);
}

// ── INIT ─────────────────────────────────────────────────────────────────
function init() {
  document.getElementById("desktop").style.background = CFG.desktopColor;
  if (!CFG.showCrt) document.getElementById("crt-overlay").style.display="none";

  buildDesktopIcons();
  buildStartMenu();

  const area = document.getElementById("desktop-area");
  WINS.forEach(cfg=>{
    const el = buildWin(cfg);
    area.appendChild(el);
    wEls[cfg.id] = el;
    updateWin(cfg.id);
  });

  document.getElementById("start-btn").addEventListener("click", e=>{
    e.stopPropagation(); selIco(null);
    if (CFG.enableSounds && !S.menuOpen) SFX.menu();
    S.menuOpen = !S.menuOpen;
    updateStartMenu(); updateTaskbar();
  });

  document.getElementById("desktop").addEventListener("click",()=>{
    S.menuOpen=false; updateStartMenu(); selIco(null); updateTaskbar();
  });

  document.addEventListener("keydown",e=>{
    if(e.key==="Escape"){S.menuOpen=false;updateStartMenu();selIco(null);updateTaskbar();}
  });

  new ResizeObserver(([entry])=>{
    containerW=entry.contentRect.width; containerH=entry.contentRect.height;
    updateAllWins();
  }).observe(document.getElementById("desktop"));

  startClock();
  updateTaskbar();
  setTimeout(bindContactForm,100);
}

window.openWin   = openWin;
window.closeWin  = closeWin;
window.showError = showError;
window.selCmp    = selCmp;

init();
</script>
